name: Bug report
description: Report a reproducible problem with Quick Extension Manager
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues first. Do not include private extension names, browser profiles, or other sensitive data.
  - type: input
    id: version
    attributes:
      label: Extension version
      description: Find this on chrome://extensions.
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Google Chrome 138.0.7204.92
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Search...
        3. Toggle...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include relevant console errors or screenshots, with sensitive data removed.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I am not reporting a security vulnerability publicly.
          required: true

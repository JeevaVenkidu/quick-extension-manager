name: Documentation improvement
description: Report unclear, missing, or inaccurate documentation
title: "docs: "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link to the file or section that needs attention.
      placeholder: README.md#manual-installation
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested improvement
    validations:
      required: true
